<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The World B Journal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: Georgia, 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 600px;
            width: 100%;
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .masthead {
            text-align: center;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }
        .masthead h1 {
            color: #d4af37;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            font-weight: normal;
        }
        .masthead .sub {
            color: #d4af37;
            font-size: 0.75rem;
            opacity: 0.8;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .loading {
            text-align: center;
            color: #d4af37;
            padding: 4rem 0;
            font-style: italic;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .error {
            text-align: center;
            color: #c44;
            padding: 2rem;
            border: 1px solid #c44;
            border-radius: 4px;
            margin-top: 2rem;
        }
        .error a {
            color: #d4af37;
            text-decoration: none;
        }
        .meta {
            color: #888;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }
        .headline {
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: bold;
            color: #fff;
            margin-bottom: 1.2rem;
            line-height: 1.3;
        }
        .body {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 2rem;
            color: #ccc;
        }
        .quote {
            border-left: 3px solid #d4af37;
            padding-left: 1.2rem;
            font-style: italic;
            color: #aaa;
            margin-bottom: 3rem;
            line-height: 1.5;
        }
        .cta {
            margin-top: 3rem;
            text-align: center;
            color: #555;
            font-size: 0.85rem;
            padding-top: 2rem;
            border-top: 1px solid #222;
        }
        .cta p { margin-bottom: 0.8rem; }
        .cta a {
            color: #d4af37;
            text-decoration: none;
            transition: opacity 0.2s;
            font-weight: bold;
        }
        .cta a:hover { opacity: 0.7; }
        .bsky-link {
            color: #d4af37;
            text-decoration: none;
        }
        .bsky-link:hover {
            text-decoration: underline;
        }
        .post-image {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="masthead">
            <h1>The World B Journal</h1>
            <div class="sub">Official Edition — Directory of Forbidden Senses</div>
        </div>
        <div class="loading" id="loader">Querying World B archives...</div>
    </div>

    <script>
        const CONFIG = {
            did: 'did:plc:7hz2stajsnytqbcoz33bsz7f',
            handle: 'world-b.bsky.social',
            pdsUrl: 'https://bsky.social',
            webhookUrl: 'https://n8n.jlrvr.be/webhook/monde-b-scan'
        };

        // Rate limiting for webhook: max 1 trigger every 30 seconds
        function shouldTriggerWebhook() {
            const lastTrigger = localStorage.getItem('monde_b_last_webhook');
            const now = Date.now();
            const minInterval = 30000; // 30 seconds
            
            if (!lastTrigger) {
                return true;
            }
            
            return (now - parseInt(lastTrigger)) > minInterval;
        }
        
        function markWebhookTriggered() {
            localStorage.setItem('monde_b_last_webhook', Date.now().toString());
        }

        async function triggerNextEdition() {
            // Check if it's not just a page refresh
            const isPageRefresh = performance.navigation?.type === 1 || 
                                  document.readyState === 'complete';
            
            // If it's a quick refresh (less than 2 seconds), skip it
            const pageLoadTime = performance.now();
            if (pageLoadTime < 2000 && sessionStorage.getItem('monde_b_visited')) {
                console.log("Page refresh detected, skipping webhook.");
                return;
            }
            
            sessionStorage.setItem('monde_b_visited', 'true');
            
            // Check rate limiting
            if (!shouldTriggerWebhook()) {
                console.log("Webhook rate limited, too soon since last trigger.");
                return;
            }
            
            try {
                await fetch(CONFIG.webhookUrl, { mode: 'no-cors' });
                markWebhookTriggered();
                console.log("Next edition triggered.");
            } catch (e) {
                console.log("Trigger failed, but that's okay.");
            }
        }

        async function fetchLatestPost() {
            const container = document.getElementById('app');
            const loader = document.getElementById('loader');
            
            try {
                const url = `${CONFIG.pdsUrl}/xrpc/com.atproto.repo.listRecords?repo=${CONFIG.did}&collection=app.bsky.feed.post&limit=10`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                
                if (!data.records || data.records.length === 0) {
                    throw new Error('No edition published');
                }

                // Filter to not take replies
                const validRecords = data.records.filter(r => {
                    const v = r.value;
                    if (v.reply) return false;
                    if (!v.text || v.text.trim() === '') return false;
                    return true;
                });

                if (validRecords.length === 0) {
                    throw new Error('No edition published');
                }

                const record = validRecords[0];
                const post = parseRecord(record);
                const html = buildHTML(post);
                
                loader.remove();
                container.insertAdjacentHTML('beforeend', html);
                
            } catch (err) {
                console.error('Error:', err);
                loader.innerHTML = `
                    <div class="error">
                        World B is temporarily unavailable.<br>
                        <small>${err.message}</small><br><br>
                        <a href="https://bsky.app/profile/${CONFIG.handle}" target="_blank" rel="noopener">
                            View directly on Bluesky →
                        </a>
                    </div>
                `;
            }
        }

        function parseRecord(record) {
            const uri = record.uri;
            const rkey = uri.split('/').pop();
            const v = record.value;

            let imageHtml = '';
            if (v.embed && v.embed.$type === 'app.bsky.embed.images' && v.embed.images && v.embed.images.length > 0) {
                const img = v.embed.images[0];
                const imgCid = img.image.ref && img.image.ref['$link'] ? img.image.ref['$link'] : '';
                const imgAlt = img.alt || '';
                if (imgCid) {
                    const thumbUrl = `https://cdn.bsky.app/img/feed_thumbnail/plain/${CONFIG.did}/${imgCid}@jpeg`;
                    imageHtml = `<img src="${thumbUrl}" alt="${escapeHtml(imgAlt)}" class="post-image" loading="lazy">`;
                }
            }

            const facetsHtml = renderFacets(v);
            const parsed = parsePost(v.text);

            return {
                ...parsed,
                facetsHtml,
                imageHtml,
                date: v.createdAt,
                url: `https://bsky.app/profile/${CONFIG.handle}/post/${rkey}`
            };
        }

        function renderFacets(value) {
            const text = value.text;
            const facets = value.facets;
            if (!facets || facets.length === 0) return escapeHtml(text);

            const sorted = [...facets].sort((a, b) => a.index.byteStart - b.index.byteStart);
            let result = '';
            let lastEnd = 0;

            for (const facet of sorted) {
                if (facet.index.byteStart > lastEnd) {
                    result += escapeHtml(text.substring(lastEnd, facet.index.byteStart));
                }

                const segment = text.substring(facet.index.byteStart, facet.index.byteEnd);
                const feature = facet.features && facet.features[0];

                if (feature) {
                    if (feature.$type === 'app.bsky.richtext.facet#link') {
                        result += `<a href="${escapeHtml(feature.uri)}" target="_blank" rel="noopener" class="bsky-link">${escapeHtml(segment)}</a>`;
                    } else if (feature.$type === 'app.bsky.richtext.facet#mention') {
                        result += `<a href="https://bsky.app/profile/${escapeHtml(feature.did)}" target="_blank" rel="noopener" class="bsky-link">@${escapeHtml(segment.replace('@', ''))}</a>`;
                    } else if (feature.$type === 'app.bsky.richtext.facet#tag') {
                        result += `<a href="https://bsky.app/search?q=%23${escapeHtml(feature.tag)}" target="_blank" rel="noopener" class="bsky-link">#${escapeHtml(feature.tag)}</a>`;
                    } else {
                        result += escapeHtml(segment);
                    }
                } else {
                    result += escapeHtml(segment);
                }

                lastEnd = facet.index.byteEnd;
            }

            if (lastEnd < text.length) {
                result += escapeHtml(text.substring(lastEnd));
            }

            return result;
        }

        function parsePost(text) {
            const blocks = text.split(/\n\s*\n/).map(b => b.trim());
            if (blocks.length >= 2 && blocks[0].includes('📰')) {
                return {
                    dayPart: blocks[0].replace('📰 ', '').trim(),
                    headline: blocks[1] || '',
                    body: blocks[2] || '',
                    quote: blocks[3] ? blocks[3].replace('💬', '').trim() : '',
                    structured: true
                };
            }
            return {
                dayPart: 'Special Edition',
                headline: blocks[0] || 'World B News',
                body: blocks.slice(1).join('\n\n') || text,
                quote: '',
                structured: false
            };
        }

        function buildHTML(post) {
            const date = new Date(post.date);
            const dateStr = date.toLocaleDateString('en-US', { day: 'numeric', month: 'long', year: 'numeric' });
            const timeStr = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            
            let html = '';
            
            if (post.imageHtml) {
                html += post.imageHtml;
            }
            
            html += `<div class="meta">${escapeHtml(post.dayPart)} · ${dateStr} at ${timeStr}</div>`;
            
            if (post.structured) {
                html += `<div class="headline">${escapeHtml(post.headline)}</div>`;
                if (post.body) {
                    html += `<div class="body">${post.facetsHtml || escapeHtml(post.body)}</div>`;
                }
                if (post.quote) html += `<div class="quote">"${escapeHtml(post.quote)}"</div>`;
            } else {
                html += `<div class="body" style="white-space:pre-wrap">${post.facetsHtml || escapeHtml(post.body)}</div>`;
            }
            
            html += `<div class="cta"><p>📱 Your visit has triggered the preparation of the next edition.</p><p><a href="${post.url}" target="_blank" rel="noopener">Full archives on Bluesky →</a></p></div>`;
            
            return html;
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        window.onload = () => {
            fetchLatestPost();
            triggerNextEdition();
        };
    </script>
</body>
</html>
