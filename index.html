<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Journal du Monde B</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: Georgia, 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            animation: fadeIn 0.8s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .masthead {
            text-align: center;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .masthead h1 {
            color: #d4af37;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
        }
        
        .masthead .sub {
            color: #d4af37;
            font-size: 0.75rem;
            opacity: 0.8;
            letter-spacing: 2px;
        }
        
        .loading {
            text-align: center;
            color: #d4af37;
            padding: 4rem 0;
            font-style: italic;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .error {
            text-align: center;
            color: #c44;
            padding: 2rem;
            border: 1px solid #c44;
            border-radius: 4px;
            margin-top: 2rem;
        }
        
        .error small {
            color: #888;
            display: block;
            margin-top: 0.5rem;
        }
        
        .meta {
            color: #888;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }
        
        .headline {
            font-size: clamp(1.3rem, 4vw, 1.8rem);
            font-weight: bold;
            color: #fff;
            margin-bottom: 1.2rem;
            line-height: 1.3;
        }
        
        .body {
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 2rem;
            color: #ccc;
        }
        
        .quote {
            border-left: 3px solid #d4af37;
            padding-left: 1.2rem;
            font-style: italic;
            color: #aaa;
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }
        
        .raw-fallback {
            white-space: pre-wrap;
            font-size: 1rem;
            line-height: 1.6;
            color: #ccc;
            background: rgba(255,255,255,0.03);
            padding: 1.5rem;
            border-radius: 4px;
            margin-bottom: 2rem;
        }
        
        .cta {
            margin-top: 3rem;
            text-align: center;
            color: #555;
            font-size: 0.85rem;
            padding-top: 2rem;
            border-top: 1px solid #222;
        }
        
        .cta p {
            margin-bottom: 0.8rem;
        }
        
        .cta a {
            color: #d4af37;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        
        .cta a:hover {
            border-bottom-color: #d4af37;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="masthead">
            <h1>Le Journal du Monde B</h1>
            <div class="sub">Édition Officielle — Directoire des Sens Interdits</div>
        </div>
        <div class="loading" id="loader">Chargement des nouvelles du Monde B...</div>
    </div>

    <script>
        // ═══════════════════════════════════════
        // CONFIGURATION
        // ═══════════════════════════════════════
        const CONFIG = {
            handle: 'julienlrvr.com',      // ← Ton handle Bluesky
            bskyService: 'https://bsky.social/xrpc'
        };

        // ═══════════════════════════════════════
        // RÉCUPÉRATION DU DERNIER POST
        // ═══════════════════════════════════════
        async function fetchLatestPost() {
            const container = document.getElementById('app');
            const loader = document.getElementById('loader');
            
            try {
                // Étape 1 : Résoudre le handle en DID
                const resolveRes = await fetch(
                    `${CONFIG.bskyService}/com.atproto.resolveHandle?handle=${CONFIG.handle}`
                );
                if (!resolveRes.ok) throw new Error('Journal introuvable');
                const { did } = await resolveRes.json();
                
                // Étape 2 : Récupérer le dernier post
                const feedRes = await fetch(
                    `${CONFIG.bskyService}/app.bsky.feed.getAuthorFeed?actor=${did}&limit=1`
                );
                if (!feedRes.ok) throw new Error('Édition indisponible');
                const data = await feedRes.json();
                
                if (!data.feed || data.feed.length === 0) {
                    throw new Error('Aucune édition publiée');
                }
                
                const post = data.feed[0].post;
                const text = post.record.text || '';
                const indexedAt = post.record.createdAt || new Date().toISOString();
                
                // Parser et afficher
                const parsed = parsePost(text);
                const html = buildHTML(parsed, indexedAt);
                
                loader.remove();
                container.insertAdjacentHTML('beforeend', html);
                
            } catch (err) {
                loader.innerHTML = `
                    <div class="error">
                        Le Monde B est momentanément inaccessible.
                        <small>${err.message}</small>
                    </div>
                `;
            }
        }

        // ═══════════════════════════════════════
        // PARSING DU POST
        // Format attendu :
        // 📰 MONDE B — Jour X
        // Headline
        // Body
        // 💬 Quote
        // ═══════════════════════════════════════
        function parsePost(text) {
            const lines = text.split('\n').filter(l => l.trim() !== '');
            
            // Si le format standard est respecté
            if (lines.length >= 2 && lines[0].includes('📰')) {
                return {
                    dayPart: lines[0].replace('📰 ', '').trim(),
                    headline: lines[1] ? lines[1].trim() : '',
                    body: lines[2] ? lines[2].trim() : '',
                    quote: lines[3] ? lines[3].replace('💬', '').trim() : '',
                    structured: true
                };
            }
            
            // Fallback : affichage brut mais propre
            return {
                dayPart: 'Édition du Monde B',
                headline: lines[0] || 'Nouvelles',
                body: lines.slice(1).join('\n\n') || text,
                quote: '',
                structured: false
            };
        }

        // ═══════════════════════════════════════
        // CONSTRUCTION DU HTML
        // ═══════════════════════════════════════
        function buildHTML(parsed, dateISO) {
            const date = new Date(dateISO);
            const dateStr = date.toLocaleDateString('fr-FR', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
            const timeStr = date.toLocaleTimeString('fr-FR', {
                hour: '2-digit', minute: '2-digit'
            });
            
            let html = '';
            
            html += `<div class="meta">${escapeHtml(parsed.dayPart)} · Publié le ${dateStr} à ${timeStr}</div>`;
            
            if (parsed.structured) {
                html += `<div class="headline">${escapeHtml(parsed.headline)}</div>`;
                if (parsed.body) html += `<div class="body">${escapeHtml(parsed.body)}</div>`;
                if (parsed.quote) html += `<div class="quote">"${escapeHtml(parsed.quote)}"</div>`;
            } else {
                html += `<div class="raw-fallback">${escapeHtml(parsed.body)}</div>`;
            }
            
            html += `
                <div class="cta">
                    <p>📱 Scannez le QR code pour générer la prochaine édition.</p>
                    <p>
                        <a href="https://bsky.app/profile/${CONFIG.handle}" target="_blank" rel="noopener">
                            Voir l'archive complète sur Bluesky →
                        </a>
                    </p>
                </div>
            `;
            
            return html;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Lancer
        fetchLatestPost();
    </script>
</body>
</html>
