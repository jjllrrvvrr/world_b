<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Journal du Monde B</title>
    <style>
        /* CSS IMMERSIF - MONDE B */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: Georgia, 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            animation: fadeIn 1s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .masthead {
            text-align: center;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .masthead h1 {
            color: #d4af37;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            font-weight: normal;
        }
        
        .masthead .sub {
            color: #d4af37;
            font-size: 0.75rem;
            opacity: 0.8;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .loading {
            text-align: center;
            color: #d4af37;
            padding: 4rem 0;
            font-style: italic;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .error {
            text-align: center;
            color: #c44;
            padding: 2rem;
            border: 1px solid #c44;
            border-radius: 4px;
            margin-top: 2rem;
            font-family: sans-serif;
        }
        
        .meta {
            color: #888;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }
        
        .headline {
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: bold;
            color: #fff;
            margin-bottom: 1.2rem;
            line-height: 1.3;
        }
        
        .body {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 2rem;
            color: #ccc;
        }
        
        .quote {
            border-left: 3px solid #d4af37;
            padding-left: 1.2rem;
            font-style: italic;
            color: #aaa;
            margin-bottom: 3rem;
            line-height: 1.5;
        }
        
        .cta {
            margin-top: 3rem;
            text-align: center;
            color: #555;
            font-size: 0.85rem;
            padding-top: 2rem;
            border-top: 1px solid #222;
        }
        
        .cta p { margin-bottom: 0.8rem; }
        
        .cta a {
            color: #d4af37;
            text-decoration: none;
            transition: opacity 0.2s;
            font-weight: bold;
        }
        
        .cta a:hover { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="masthead">
            <h1>Le Journal du Monde B</h1>
            <div class="sub">Édition Officielle — Directoire des Sens Interdits</div>
        </div>
        <div class="loading" id="loader">Interrogation des archives du Monde B...</div>
    </div>

    <script>
        const CONFIG = {
            handle: 'julienlrvr.com', 
            bskyService: 'https://bsky.social/xrpc'
        };

        async function fetchLatestPost() {
            const container = document.getElementById('app');
            const loader = document.getElementById('loader');
            
            try {
                // 1. Résolution du handle en DID
                const resolveRes = await fetch(`${CONFIG.bskyService}/com.atproto.resolveHandle?handle=${CONFIG.handle}`);
                if (!resolveRes.ok) throw new Error('Handle introuvable');
                const { did } = await resolveRes.json();
                
                // 2. Récupération du dernier post
                const feedRes = await fetch(`${CONFIG.bskyService}/app.bsky.feed.getAuthorFeed?actor=${did}&limit=1`);
                if (!feedRes.ok) throw new Error('Flux indisponible');
                const data = await feedRes.json();
                
                if (!data.feed || data.feed.length === 0) {
                    throw new Error('Aucune édition publiée');
                }
                
                const post = data.feed[0].post;
                const text = post.record.text || '';
                const indexedAt = post.record.createdAt || new Date().toISOString();
                
                const parsed = parsePost(text);
                const html = buildHTML(parsed, indexedAt);
                
                loader.remove();
                container.insertAdjacentHTML('beforeend', html);
                
            } catch (err) {
                loader.innerHTML = `
                    <div class="error">
                        Le Monde B est momentanément inaccessible.<br>
                        <small style="font-size:0.7rem">${err.message}</small>
                    </div>
                `;
            }
        }

        function parsePost(text) {
            // On sépare par les doubles sauts de ligne pour identifier les blocs
            const blocks = text.split(/\n\s*\n/).map(b => b.trim());
            
            // Format attendu :
            // [0] 📰 MONDE B — Jour X
            // [1] Headline
            // [2] Body
            // [3] 💬 Quote
            
            if (blocks.length >= 2 && blocks[0].includes('📰')) {
                return {
                    dayPart: blocks[0].replace('📰 ', '').trim(),
                    headline: blocks[1] || '',
                    body: blocks[2] || '',
                    quote: blocks[3] ? blocks[3].replace('💬', '').trim() : '',
                    structured: true
                };
            }
            
            // Fallback si le format est différent
            return {
                dayPart: 'Édition Spéciale',
                headline: blocks[0] || 'Nouvelles du Monde B',
                body: blocks.slice(1).join('\n\n') || text,
                quote: '',
                structured: false
            };
        }

        function buildHTML(parsed, dateISO) {
            const date = new Date(dateISO);
            const dateStr = date.toLocaleDateString('fr-FR', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
            const timeStr = date.toLocaleTimeString('fr-FR', {
                hour: '2-digit', minute: '2-digit'
            });
            
            let html = '';
            html += `<div class="meta">${escapeHtml(parsed.dayPart)} · ${dateStr} à ${timeStr}</div>`;
            
            if (parsed.structured) {
                html += `<div class="headline">${escapeHtml(parsed.headline)}</div>`;
                if (parsed.body) html += `<div class="body">${escapeHtml(parsed.body)}</div>`;
                if (parsed.quote) html += `<div class="quote">"${escapeHtml(parsed.quote)}"</div>`;
            } else {
                html += `<div class="body" style="white-space:pre-wrap">${escapeHtml(parsed.body)}</div>`;
            }
            
            html += `
                <div class="cta">
                    <p>📱 Scannez le QR code pour générer l'édition suivante.</p>
                    <p>
                        <a href="https://bsky.app/profile/${CONFIG.handle}" target="_blank" rel="noopener">
                            Accéder aux archives complètes sur Bluesky →
                        </a>
                    </p>
                </div>
            `;
            
            return html;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        fetchLatestPost();
    </script>
</body>
</html>
